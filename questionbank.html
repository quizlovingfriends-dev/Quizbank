    darkMode: "class",

            "secondary":"#ba0034","surface":"#fdf8f8","surface-container":"#f1edec",
            "surface-container-low":"#f7f3f2","surface-container-high":"#ebe7e6",

<style>
body { background:#fdf8f8; font-family:"JetBrains Mono", monospace; }
.hard-shadow { box-shadow:6px 6px 0 0 #000; transition:all .2s ease; }
.hard-shadow:hover { transform:translate(-4px,-4px); box-shadow:10px 10px 0 0 #000; }
.health-badge { display:inline-block; width:10px; height:10px; border-radius:50%; background:#00c853; margin-left:12px; vertical-align:middle; }
.health-badge.warning { background:#ffb300; } .health-badge.error { background:#ba1a1a; }
/* Filter pill styling — qb.js injects these */
#topic-filters button, #difficulty-pills-container button,
#topic-filters .filter-pill, #difficulty-pills-container .filter-pill {
    border:2px solid #000; padding:6px 12px; font-family:"JetBrains Mono",monospace;
    font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
    background:#fdf8f8; color:#000; cursor:pointer; margin:2px;
}
#topic-filters .active, #difficulty-pills-container .active,
#topic-filters button.active, #difficulty-pills-container button.active {
    background:#000; color:#fff;
}
#search-input {
    width:100%; border:3px solid #000; padding:12px; background:#fff;
    font-family:"JetBrains Mono",monospace; font-size:14px;
    box-shadow:6px 6px 0 0 #000;
}
.sidebar-label {
    display:block; font-family:"JetBrains Mono",monospace; font-size:11px;
    font-weight:700; letter-spacing:4px; text-transform:uppercase;
    color:#444748; margin-bottom:8px;
}
#questions-container { display:flex; flex-direction:column; gap:32px; }

/* ===== <quiz-card> brutalist override ===== */
quiz-card .question-card {
    background:#fdf8f8 !important; border:3px solid #000 !important; border-radius:0 !important;
    box-shadow:6px 6px 0 0 #000 !important; transition:all .2s ease !important;
    padding:0 !important; position:relative; overflow:visible;
}
quiz-card .question-card:hover { transform:translate(-4px,-4px); box-shadow:10px 10px 0 0 #000 !important; }
quiz-card .card-header {
    background:#000 !important; color:#fff !important; padding:14px 20px !important;
    border-bottom:2px solid #000 !important; display:flex !important; justify-content:space-between !important;
    align-items:center !important; gap:12px !important;
}
quiz-card .card-num {
    font-family:"JetBrains Mono",monospace !important; font-size:11px !important;
    letter-spacing:4px !important; font-weight:700 !important; color:#fff !important;
}
quiz-card .topic-badge {
    background:#0024d9 !important; color:#fff !important; padding:4px 10px !important;
    font-family:"JetBrains Mono",monospace !important; font-size:10px !important;
    letter-spacing:3px !important; font-weight:700 !important;
}
quiz-card .card-header button {
    color:#fff !important; opacity:.85;
}
quiz-card .card-header button:hover { opacity:1; color:#ba0034 !important; }
quiz-card .card-body { padding:20px 24px !important; }
quiz-card .question-text {
    font-family:"JetBrains Mono",monospace !important; font-size:17px !important;
    line-height:1.55 !important; color:#000 !important; font-weight:700 !important;
    margin-bottom:16px !important;
}
quiz-card .reveal-btn {
    width:100% !important; background:#f1edec !important; color:#000 !important;
    border:3px solid #000 !important; padding:14px !important;
    font-family:"JetBrains Mono",monospace !important; font-size:13px !important;
    font-weight:700 !important; letter-spacing:2px !important; text-transform:uppercase !important;
    cursor:pointer !important; box-shadow:4px 4px 0 0 #000 !important; border-radius:0 !important;
    transition:all .15s ease;
}
quiz-card .reveal-btn:hover { background:#000 !important; color:#fff !important; }
quiz-card .reveal-btn:active { transform:translate(4px,4px); box-shadow:none !important; }
quiz-card .answer-section {
    max-height:0; overflow:hidden; transition:max-height .35s ease;
    border-top:0; background:transparent;
}
quiz-card .answer-section.revealed { max-height:2000px; margin-top:16px; }
quiz-card .answer-inner { padding:0 24px 24px 24px; }
quiz-card .answer-block {
    background:#ffdada !important; border:3px solid #000 !important;
    padding:16px 20px !important; margin-bottom:12px !important;
}
quiz-card .answer-block strong {
    font-family:"JetBrains Mono",monospace !important; font-size:11px !important;
    letter-spacing:4px !important; font-weight:700 !important; color:#ba0034 !important;
    display:block !important; margin-bottom:8px !important;
}
quiz-card .answer-block .answer-text {
    font-family:"JetBrains Mono",monospace !important; font-size:16px !important;
    line-height:1.55 !important; color:#000 !important; font-weight:400;
}
quiz-card .answer-block:nth-child(2) { background:#f7f3f2 !important; }
quiz-card .answer-block:nth-child(2) strong { color:#0024d9 !important; }
quiz-card mark.highlight { background:#fa1e4e !important; color:#fff !important; padding:2px 4px; }
quiz-card .question-image, quiz-card .answer-image { border:3px solid #000 !important; border-radius:0 !important; }
</style>

<meta name="description" content="200+ curated GK questions, filterable by topic and difficulty.">

<!-- MAIN -->
<main class="flex-grow w-full px-4 md:px-margin py-12">

        <!-- SIDEBAR (filters) -->

                <div id="topic-filters" role="group" aria-labelledby="categories-label" style="margin-bottom:24px;">

                </div>

                    <div style="display:flex; gap:4px; flex-wrap:wrap;" id="difficulty-pills-container"></div>
                </div>

                <div style="border-top:2px solid #000; padding-top:12px;">
                    <div id="status-bar" class="font-section-label text-section-label uppercase text-on-surface-variant">STATUS: LOADING...</div>
                </div>
            </div>
        </aside>

        <!-- CARDS COLUMN -->
        <section class="col-span-1 md:col-span-9 flex flex-col gap-8">

            <header class="border-b-2 border-black pb-4 flex items-baseline justify-between">
                <div>
                    <div class="font-section-label text-section-label uppercase text-on-surface-variant">VAULT INDEX // DOCUMENT 001</div>
                    <h1 class="font-headline-lg-mobile md:font-headline-lg font-black uppercase tracking-tighter mt-2">QUESTION BANK</h1>
                </div>
                <a href="index.html" class="hidden md:inline font-section-label text-section-label uppercase hover:text-secondary">← HOME</a>
            </header>

            <!-- qb.js fills this with <quiz-card> elements -->
            <div id="questions-container" class="cards-container">
                <div class="skeleton-card qv-card" style="height: 150px; background: rgba(0,0,0,0.05); border: 3px solid #e5e2e1; animation: qv-pulse 1.5s infinite;" data-flip-id="skel-1"></div>
                <div class="skeleton-card qv-card" style="height: 150px; background: rgba(0,0,0,0.05); border: 3px solid #e5e2e1; animation: qv-pulse 1.5s infinite; animation-delay: 0.2s;" data-flip-id="skel-2"></div>
                <div class="skeleton-card qv-card" style="height: 150px; background: rgba(0,0,0,0.05); border: 3px solid #e5e2e1; animation: qv-pulse 1.5s infinite; animation-delay: 0.4s;" data-flip-id="skel-3"></div>
            </div>
        </section>
    </div>
</main>

<script>
(function() {
    var badge = document.getElementById('site-health');
    if (!badge) return;
    var qCount = (typeof QUIZ_QUESTIONS !== 'undefined') ? QUIZ_QUESTIONS.length : 0;
    if (qCount === 0)      { badge.classList.add('error');   badge.title = 'CRITICAL: questions.js failed to load'; }
    else if (qCount < 50)  { badge.classList.add('warning'); badge.title = qCount + ' questions loaded (low)'; }
    else                   { badge.title = qCount + ' questions loaded — OK'; }
})();
</script>
