<script>
(function() {
    var list = document.getElementById('wiki-list');
    function escapeHtml(s){ return (s||'').replace(/[&<>"']/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];}); }
    function renderWiki() {
        var wiki = (typeof state !== 'undefined' && state.getWiki) ? state.getWiki() : {};
        var ids = Object.keys(wiki);
        if (ids.length === 0) {
            list.innerHTML =
                '<div class="border-[3px] border-dashed border-black p-12 text-center hard-shadow">' +
                    '<div class="font-section-label text-section-label uppercase text-secondary mb-4">NO_ENTRIES_FOUND</div>' +
                    '<div class="font-body-md text-body-md mb-6">Your wiki is empty. Save questions from the bank to build your dossier.</div>' +
                    '<a href="questionbank.html" class="inline-block bg-primary text-on-primary px-6 py-3 font-ui-button text-ui-button uppercase border-[3px] border-black hard-shadow">GO TO QUESTION BANK →</a>' +
                '</div>';
            return;
        }
        list.innerHTML = ids.map(function(id){
            var entry = wiki[id];
            var date = entry.savedAt ? new Date(entry.savedAt).toLocaleDateString() : '';
            return (
                '<div class="wiki-entry">' +
                    '<div class="wiki-head">' +
                        '<span class="wiki-title">' + escapeHtml(entry.title || 'UNTITLED') + '</span>' +
                        '<span class="wiki-tag">' + escapeHtml((entry.topic || 'GENERAL').toUpperCase()) + '</span>' +
                    '</div>' +
                    '<div class="wiki-body">' +
                        '<div class="wiki-section">' +
                            '<strong>ANSWER</strong>' +
                            '<div class="answer-text">' + escapeHtml(entry.answer || '') + '</div>' +
                        '</div>' +
                        (entry.funda ?
                            '<div class="wiki-section">' +
                                '<strong>FUNDA</strong>' +
                                '<div class="answer-text">' + escapeHtml(entry.funda) + '</div>' +
                            '</div>' : '') +
                    '</div>' +
                    '<div class="wiki-meta">' +
                        '<span>SAVED: ' + escapeHtml(date) + '</span>' +
                        '<button class="wiki-del" data-id="' + escapeHtml(id) + '">DELETE</button>' +
                    '</div>' +
                '</div>'
            );
        }).join('');
        list.querySelectorAll('.wiki-del').forEach(function(btn){
            btn.addEventListener('click', function(){
                if (confirm('Erase this entry from your wiki?')) {
                    if (typeof state !== 'undefined' && state.removeFromWiki) {
                        state.removeFromWiki(this.dataset.id);
                        renderWiki();
                    }
                }
            });
        });
    }
    window.removeEntry = function(id) {
        if (confirm('Erase this entry?')) {
            if (typeof state !== 'undefined' && state.removeFromWiki) {
                state.removeFromWiki(id);
                renderWiki();
            }
        }
    };
    if (typeof state !== 'undefined' && state.subscribe) state.subscribe(renderWiki);
    renderWiki();
})();
</script>

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="js/animations.js"></script>
<script>
window.addEventListener('load', function () {
    if (!window.gsap) return;
    gsap.registerPlugin(ScrollTrigger);
    setTimeout(function () {
        gsap.utils.toArray('.wiki-entry').forEach(function (card) {
            gsap.from(card, {
                y: 60, opacity: 0, scale: 0.96, duration: 0.5, ease: 'back.out(1.4)',
                scrollTrigger: { trigger: card, start: 'top 92%' }
            });
        });
    }, 200);
});
</script>

<script>
(function() {
    var badge = document.getElementById('site-health');
    if (!badge) return;
    var qCount = (typeof QUIZ_QUESTIONS !== 'undefined') ? QUIZ_QUESTIONS.length : 0;
    if (qCount === 0)      { badge.classList.add('error');   badge.title = 'CRITICAL: questions.js failed to load'; }
    else if (qCount < 50)  { badge.classList.add('warning'); badge.title = qCount + ' questions loaded (low)'; }
    else                   { badge.title = qCount + ' questions loaded — OK'; }
})();
</script>
