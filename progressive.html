<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script>
tailwind.config = {
    darkMode: "class",
    theme: { extend: {
        colors: {
            "secondary":"#ba0034","surface":"#fdf8f8","surface-container":"#f1edec",
            "surface-container-low":"#f7f3f2","surface-variant":"#e5e2e1",
            "on-secondary":"#fff","on-primary":"#fff","on-surface-variant":"#444748",
            "primary":"#000","background":"#fdf8f8"
        },
        borderRadius:{DEFAULT:"0px",lg:"0px",xl:"0px",full:"0px"},
        spacing:{margin:"32px","border-weight":"3px","rule-weight":"2px",gutter:"24px"},
        fontFamily:{
            "section-label":["JetBrains Mono"],"body-md":["JetBrains Mono"],
            "hero-display":["Inter"],"headline-lg":["Inter"],"headline-lg-mobile":["Inter"],
            "ui-button":["JetBrains Mono"]
        },
        fontSize:{
            "section-label":["11px",{lineHeight:"16px",letterSpacing:"4px",fontWeight:"700"}],
            "body-md":["14px",{lineHeight:"1.6",letterSpacing:"0",fontWeight:"400"}],
            "ui-button":["16px",{lineHeight:"1",letterSpacing:"1px",fontWeight:"700"}],
            "headline-lg-mobile":["32px",{lineHeight:"1.1",letterSpacing:"-1px",fontWeight:"900"}],
            "headline-lg":["48px",{lineHeight:"1.1",letterSpacing:"-2px",fontWeight:"900"}],
            "hero-display":["96px",{lineHeight:"1.0",letterSpacing:"-4px",fontWeight:"900"}]
        }
    }}
}
</script>
<style>
body { background:#fdf8f8; font-family:"JetBrains Mono", monospace; }
.hard-shadow { box-shadow:6px 6px 0 0 #000; transition:all .2s ease; }
.hard-shadow:hover { transform:translate(-4px,-4px); box-shadow:10px 10px 0 0 #000; }
.health-badge { display:inline-block; width:10px; height:10px; border-radius:50%; background:#00c853; margin-left:12px; vertical-align:middle; }
.health-badge.warning { background:#ffb300; } .health-badge.error { background:#ba1a1a; }

/* ======= Progressive game ======= */
.prog-wrap { display:flex; flex-direction:column; gap:24px; }
.prog-header { border-bottom:3px solid #000; padding-bottom:24px; }
.prog-scorebar {
    display:grid; grid-template-columns:repeat(3,1fr); gap:0;
    border:3px solid #000; box-shadow:6px 6px 0 0 #000; background:#fff;
}
.prog-scorebar > div {
    padding:16px 20px; border-right:2px solid #000;
    display:flex; flex-direction:column; gap:4px;
}
.prog-scorebar > div:last-child { border-right:none; }
.sb-label { font-size:11px; letter-spacing:4px; font-weight:700; color:#444748; text-transform:uppercase; }
.sb-value { font-family:"Inter",sans-serif; font-size:32px; font-weight:900; line-height:1; color:#000; }

.prog-parts { display:flex; flex-direction:column; gap:16px; }
.prog-part {
    border:3px solid #000; box-shadow:6px 6px 0 0 #000; background:#fdf8f8;
    animation: progSlide .4s cubic-bezier(.65,0,.35,1);
}
@keyframes progSlide {
    from { transform:translateY(20px); opacity:0; }
    to   { transform:translateY(0);    opacity:1; }
}
.prog-part-head {
    background:#000; color:#fff; padding:10px 16px;
    display:flex; justify-content:space-between; align-items:center;
}
.prog-part-num { font-size:11px; letter-spacing:4px; font-weight:700; text-transform:uppercase; }
.prog-part-body {
    padding:20px 24px; font-family:"JetBrains Mono",monospace;
    font-size:17px; line-height:1.6; color:#000; font-weight:700;
}
.prog-part-buttons {
    display:flex; gap:0; border-top:2px solid #000;
}
.prog-part-buttons button {
    flex:1; padding:14px; border:0; cursor:pointer;
    font-family:"JetBrains Mono",monospace; font-size:13px; font-weight:700;
    letter-spacing:2px; text-transform:uppercase;
}
.prog-knew {
    background:#fdf8f8; color:#000; border-right:2px solid #000 !important;
}
.prog-knew:hover { background:#00c853; color:#000; }
.prog-knew:disabled { opacity:.4; cursor:not-allowed; }
.prog-missed { background:#fdf8f8; color:#000; }
.prog-missed:hover { background:#ba0034; color:#fff; }
.prog-missed:disabled { opacity:.4; cursor:not-allowed; }
.prog-part.marked-knew { background:#defaf0; }
.prog-part.marked-knew .prog-part-head { background:#00c853; color:#000; }
.prog-part.marked-missed { background:#fff0f0; }
.prog-part.marked-missed .prog-part-head { background:#ba0034; }

.prog-cta {
    background:#ba0034; color:#fff; border:3px solid #000;
    box-shadow:6px 6px 0 0 #000; padding:18px; cursor:pointer;
    font-family:"JetBrains Mono",monospace; font-size:16px; font-weight:700;
    letter-spacing:2px; text-transform:uppercase; transition:all .15s ease;
}
.prog-cta:hover { transform:translate(-4px,-4px); box-shadow:10px 10px 0 0 #000; }
.prog-cta:active { transform:translate(6px,6px); box-shadow:none; }

/* Result */
.prog-result-card {
    border:3px solid #000; background:#000; color:#fff;
    box-shadow:6px 6px 0 0 #000; padding:32px;
}
.prog-result-score {
    font-family:"Inter",sans-serif; font-size:96px; font-weight:900; line-height:1;
    letter-spacing:-4px;
}
.prog-result-funda {
    margin-top:24px; padding:16px; border:2px solid #444748; background:#1c1b1b;
    font-size:14px; line-height:1.6;
}
.prog-result-funda strong {
    display:block; font-size:11px; letter-spacing:4px; color:#ba0034;
    margin-bottom:8px;
}
.prog-result-buttons {
    display:flex; flex-direction:column; gap:12px; margin-top:24px;
}
@media (min-width: 768px) {
    .prog-result-buttons { flex-direction:row; }
}
</style>

<meta name="description" content="QuizVault Progressive — multi-part questions, revealed one part at a time.">

<script>
(function() {
    var badge = document.getElementById('site-health');
    if (!badge) return;
    var qCount = (typeof QUIZ_QUESTIONS !== 'undefined') ? QUIZ_QUESTIONS.length : 0;
    if (qCount === 0)      { badge.classList.add('error');   badge.title = 'CRITICAL: questions.js failed to load'; }
    else if (qCount < 50)  { badge.classList.add('warning'); badge.title = qCount + ' questions loaded (low)'; }
    else                   { badge.title = qCount + ' questions loaded — OK'; }
})();
</script>
