    borderRadius:{DEFAULT:"0px",lg:"0px",xl:"0px",full:"0px"},
    spacing:{margin:"32px","border-weight":"3px","rule-weight":"2px",gutter:"24px"},
    fontFamily:{"section-label":["JetBrains Mono"],"body-md":["JetBrains Mono"],"hero-display":["Inter"],"headline-lg":["Inter"],"headline-lg-mobile":["Inter"],"ui-button":["JetBrains Mono"]},

<style>
body { background:#fdf8f8; font-family:"JetBrains Mono", monospace; }
.hard-shadow { box-shadow:6px 6px 0 0 #000; transition:all .2s ease; }
.hard-shadow:hover { transform:translate(-4px,-4px); box-shadow:10px 10px 0 0 #000; }
.health-badge { display:inline-block; width:10px; height:10px; border-radius:50%; background:#00c853; margin-left:12px; vertical-align:middle; }

.theme-scorebar { display:grid; grid-template-columns:repeat(3,1fr); border:3px solid #000; box-shadow:6px 6px 0 0 #000; background:#fff; margin-bottom:24px; }
.theme-scorebar > div { padding:16px 20px; border-right:2px solid #000; display:flex; flex-direction:column; gap:4px; }
.theme-scorebar > div:last-child { border-right:none; }
.sb-label { font-size:11px; letter-spacing:4px; font-weight:700; color:#444748; text-transform:uppercase; }
.sb-value { font-family:"Inter",sans-serif; font-size:32px; font-weight:900; line-height:1; color:#000; }

.theme-parts { display:flex; flex-direction:column; gap:16px; }
.theme-part { border:3px solid #000; box-shadow:6px 6px 0 0 #000; background:#fdf8f8; animation:tpop .35s ease; }
@keyframes tpop { from { transform:translateY(20px); opacity:0; } to { transform:translateY(0); opacity:1; } }
.theme-part-head { background:#000; color:#fff; padding:10px 16px; }
.theme-part-num { font-size:11px; letter-spacing:4px; font-weight:700; text-transform:uppercase; }
.theme-part-body { padding:20px 24px; font-family:"JetBrains Mono",monospace; font-size:16px; line-height:1.6; font-weight:700; }
.theme-part-answer { background:#ffdada; border-top:2px solid #000; padding:16px 24px; }
.theme-answer-label { font-size:11px; letter-spacing:4px; font-weight:700; color:#ba0034; text-transform:uppercase; margin-bottom:6px; }
.theme-answer-text { font-family:"Inter",sans-serif; font-size:24px; font-weight:900; line-height:1.1; color:#000; }
.theme-part-buttons { display:flex; gap:0; border-top:2px solid #000; }
.theme-part-buttons button { flex:1; padding:14px; border:0; cursor:pointer; font-family:"JetBrains Mono",monospace; font-size:13px; font-weight:700; letter-spacing:2px; text-transform:uppercase; background:#fdf8f8; color:#000; }
.t-reveal:hover { background:#0024d9; color:#fff; }
.t-knew { border-right:2px solid #000 !important; }
.t-knew:hover { background:#00c853; color:#000; }
.t-missed:hover { background:#ba0034; color:#fff; }
.theme-part-buttons button:disabled { opacity:.45; cursor:not-allowed; }
.theme-part.marked-knew .theme-part-head { background:#00c853; color:#000; }
.theme-part.marked-missed .theme-part-head { background:#ba0034; color:#fff; }

.theme-reveal-card { border:3px solid #000; background:#000; color:#fff; box-shadow:6px 6px 0 0 #000; padding:32px; margin-top:24px; }
.theme-score { font-family:"Inter",sans-serif; font-size:64px; font-weight:900; line-height:1; letter-spacing:-2px; }
.theme-reveal-answer { font-family:"Inter",sans-serif; font-size:64px; font-weight:900; line-height:1; letter-spacing:-2px; color:#fa1e4e; margin-top:6px; }
.theme-reveal-hint { font-size:13px; opacity:.7; margin-top:10px; }
.theme-result-funda { margin-top:24px; padding:16px; border:2px solid #444748; background:#1c1b1b; font-size:14px; line-height:1.6; }
.theme-result-funda strong { display:block; font-size:11px; letter-spacing:4px; color:#ba0034; margin-bottom:8px; }
.theme-result-buttons { display:flex; flex-direction:column; gap:12px; margin-top:24px; }
@media (min-width:768px) { .theme-result-buttons { flex-direction:row; } }
</style>
