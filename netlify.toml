# ──────────────────────────────────────────────────────────────────────────────
# Netlify build & deploy configuration for QuizVault
#
# Every push to `main` triggers Netlify to:
#   1. Pull the latest repo
#   2. Run the build command (see [build] below)
#   3. Publish the contents of the publish dir
#
# Goal: only serve the static site files, NOT the quiz-automator Python pipeline,
# backups, or any debug artifacts.
# ──────────────────────────────────────────────────────────────────────────────

[build]
  # No build step — site is plain HTML/CSS/JS. Netlify just publishes what's served.
  publish = "."
  command = ""

# ── Block the Python pipeline / internal files from being served ──────────────
# Even though they're in the repo for version control, no one should be able to
# fetch them from the live site.
[[redirects]]
  from = "/quiz-automator/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/PHASE*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/*.md"
  to = "/404.html"
  status = 404
  force = true

# ── Security headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# ── Cache static assets aggressively, HTML never ──────────────────────────────
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── PWA service worker — never cache it (always fetch fresh so updates land) ──
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache"
